function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
      });
    }, { threshold, rootMargin: "0px 0px -8% 0px" });
    io.observe(el);
    el.querySelectorAll(".reveal, .reveal-soft").forEach(n => io.observe(n));
    return () => io.disconnect();
  }, [threshold]);
  return ref;
}

function CountUp({ target, duration = 1600, suffix = "", className = "", plusClass = "plus" }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting && !started.current) {
          started.current = true;
          const start = performance.now();
          const tick = now => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 4);
            setVal(Math.round(target * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
          io.unobserve(el);
        }
      });
    }, { threshold: 0.4 });
    io.observe(el);
    return () => io.disconnect();
  }, [target, duration]);

    val, suffix && React.createElement("span", { className: plusClass }, suffix));

  useEffect(() => {
    const ids = ["about", "services", "experience", "stack", "contact"];
    const sections = ids.map(id => document.getElementById(id)).filter(Boolean);
    const onScroll = () => {
      const atBottom = window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 64;
      if (atBottom) { setActive(ids[ids.length - 1]); return; }

      let current = "";
      for (const s of sections) { if (s.offsetTop <= y) current = s.id; }
